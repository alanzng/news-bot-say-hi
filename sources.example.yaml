sources:
  gold-price:
    enabled: true
    schedule: "0 8 * * *"   # 8 AM daily

  bitcoin-price:
    enabled: true
    schedule: "0 */6 * * *" # Every 6 hours

  stock-price:
    enabled: true
    schedule: "0 9 * * 1-5" # 9 AM on Vietnamese trading weekdays
    tickers:
      - HPG
      - MBB
      - SSI
      - E1VFVN30
      - VNINDEX

  kimlong-gold-price:
    enabled: true
    schedule: "0 8 * * *"   # 8 AM daily
    # product_ids: [1]  # default: [1] (NHẪN TRƠN & ÉP VĨ). Other IDs: 2, 8, 3, 4, 5

  github-trending:
    enabled: true
    schedule: "0 9 * * *"   # 9 AM daily
    language: ""             # empty = all languages, or e.g. "python"
    since: "daily"           # daily, weekly, monthly
    limit: 5
